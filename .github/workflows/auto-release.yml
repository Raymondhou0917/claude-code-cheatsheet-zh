name: Auto release on version bump

on:
  push:
    branches: [master]
    paths:
      - README.md
      - index.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from README
        id: ver
        run: |
          VER=$(grep -oE 'Claude Code v[0-9.]+' README.md | head -1 | sed 's/Claude Code //')
          if [ -z "$VER" ]; then
            echo "::warning::Could not extract version from README"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VER"

      - name: Check if release already exists
        id: check
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          if gh release view "$VER" >/dev/null 2>&1; then
            echo "Release $VER already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $VER not found, will create."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes from commits
        id: notes
        if: steps.check.outputs.skip == 'false'
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9.]+$' | head -1 || true)
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..HEAD"
            echo "Using range: $RANGE"
            LOG=$(git log --pretty=format:'- %s' "$RANGE")
          else
            echo "No previous tag, using last 10 commits."
            LOG=$(git log --pretty=format:'- %s' -10)
          fi
          {
            echo 'notes<<EOF'
            echo "## Claude Code ${VER} 同步更新"
            echo ""
            echo "同步原站 [cc.storyfox.cz](https://cc.storyfox.cz/) 至 Claude Code ${VER}。"
            echo ""
            echo "### 變更"
            echo "$LOG"
            echo ""
            echo "👉 [線上閱讀](https://raymondhou0917.github.io/claude-code-cheatsheet-zh/)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          gh release create "$VER" --title "$VER" --notes "$NOTES"
          echo "Released $VER"
